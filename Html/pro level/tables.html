<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in Html</title>
</head>
<body>
    <table>
        <thead>
        <caption>Personal Information</caption>
        <tr>
            <th colspan="4">Information</th>
        </tr>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        </thead>
        <tr>
            <td>John Doe</td>
            <td>30</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Raees</td>
            <td>23</td>
            <td>abbottabad</td>
        </tr>
        <tr>
            <td>naveed khan</td>
            <td>23</td>
            <td>Nowshera</td>
        </tr>
    </table>
</body>
</html>
