<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashborad</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <h2><b>Admin Panel</b></h2>

            <ul>
                <li>Dashboard</li>
                <li>Analytics</li>
                <li>Orders</li>
                <li>Customers</li>
                <li>Products</li>
                <li>Settings</li>
            </ul>
        </aside>

        <main class="main-container">
            <header>
                <h1><b>Dashboard Overview</b></h1>
            </header>
            <section class="cards">

                <div class="card">
                    <h3>
                        <h>Total Sale</h>
                    </h3>
                    <p>$247899</p>
                </div>

                <div class="card">
                    <h3><b>Orders</b></h3>
                    <p>1245</p>
                </div>

                <div class="card">
                    <h3>
                        <h>Customers</h>
                    </h3>
                    <p>777</p>
                </div>

                <div class="card">
                    <h3>
                        <h>Revenue</h>
                    </h3>
                    <p>$9999000</p>
                </div>

            </section>

            <section class="table-section">
                <h2><b>Recent Orders</b></h2>

                <table>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Amount</th>
                    </tr>

                    <tr>
                        <td>102</td>
                        <td>Ali Khan</td>
                        <td>Completed</td>
                        <td>$250</td>
                    </tr>

                    <tr>
                        <td>103</td>
                        <td>Ahmed</td>
                        <td>Pending</td>
                        <td>$120</td>
                    </tr>
                    <tr>
                        <td>104</td>
                        <td>Usman</td>
                        <td>Completed</td>
                        <td>$350</td>
                    </tr>
                </table>
            </section>
        </main>
    </div>
</body>

</html>
