<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <link rel="stylesheet" href="style2..css">
</head>
<body>

<nav class="navbar">

        <div class="logo">
            Amazon
        </div>

        <div class="location">
            <small>Deliver to</small>
            <p>Pakistan</p>
        </div>

        <div class="search-box">
            <select>
                <option>All</option>
                <option>Books</option>
                <option>Electronics</option>
            </select>

            <input type="text" placeholder="Search Amazon">

            <button>🔍</button>
        </div>

        <div class="account">
            <small>Hello, Sign in</small>
        </div>

        <div class="orders">
            <small>Returns</small>
        </div>

        <div class="cart">
            🛒 Cart
        </div>

    </nav>

</body>
</html>
